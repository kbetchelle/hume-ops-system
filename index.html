<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HUME Ops System</title>
    <meta name="description" content="HUME Operations Management System - Staff Checklists & Daily Operations" />
    <meta name="author" content="HUME" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HUME Ops" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- PWA Manifest (omit on Lovable host to avoid CORS when /manifest.json redirects to auth-bridge) -->
    <script>
      if (!window.location.origin.includes('lovableproject.com')) {
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = '/manifest.json';
        document.head.appendChild(link);
      }
    </script>
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/app-icon.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/app-icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="HUME Ops System" />
    <meta property="og:description" content="HUME Operations Management System - Staff Checklists & Daily Operations" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-192x192.svg" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@HUMEStudio" />
    <meta name="twitter:image" content="/icons/icon-192x192.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
